<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ShopNova</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f4f6f9; }
        .admin-header { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 2rem 0; border-bottom: 4px solid #f59e0b; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">ShopNova <i class="bi bi-stars text-warning"></i> <span class="badge bg-warning text-dark ms-2">Admin</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="admin.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="admin-header mb-5 text-center">
        <div class="container">
            <h1 class="fw-bold display-5"><i class="bi bi-shield-lock-fill text-warning me-2"></i>Admin Dashboard</h1>
            <p class="lead mb-0 text-light opacity-75">Manage the ShopNova product catalog</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container flex-grow-1 mb-5">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                            <h3 class="fw-bold mb-0 text-dark">Add New Product</h3>
                            <i class="bi bi-box-seam fs-3 text-primary"></i>
                        </div>
                        
                        <div id="admin-alert" class="alert d-none fw-bold" role="alert"></div>
                        
                        <form id="add-product-form">
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary small">PRODUCT NAME</label>
                                <input type="text" id="prod-name" class="form-control form-control-lg bg-light" placeholder="e.g. Wireless Noise-Canceling Headphones" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary small">DESCRIPTION</label>
                                <textarea id="prod-desc" class="form-control bg-light" rows="3" placeholder="Describe the product features..." required></textarea>
                            </div>
                            
                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label fw-bold text-secondary small">PRICE (₦)</label>
                                    <div class="input-group input-group-lg">
                                        <span class="input-group-text bg-light text-muted border-end-0 fw-bold">₦</span>
                                        <input type="number" id="prod-price" class="form-control bg-light border-start-0 ps-0" step="0.01" min="0" placeholder="0.00" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary small">STOCK QUANTITY</label>
                                    <input type="number" id="prod-stock" class="form-control form-control-lg bg-light" value="10" min="0" required>
                                </div>
                            </div>
                            
                            <div class="row mb-5">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label fw-bold text-secondary small">CATEGORY</label>
                                    <input type="text" id="prod-category" class="form-control form-control-lg bg-light" placeholder="e.g. Electronics" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary small">IMAGE URL</label>
                                    <input type="url" id="prod-image" class="form-control form-control-lg bg-light" placeholder="https://..." required>
                                </div>
                            </div>
                            
                            <button type="submit" id="add-btn" class="btn btn-primary btn-lg w-100 py-3 fw-bold rounded-3 shadow-sm">
                                <i class="bi bi-plus-circle-fill me-2"></i>Publish Product
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
