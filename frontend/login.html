<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopNova</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f8f9fa; }
        .auth-container { max-width: 450px; margin: 5rem auto; }
        .auth-card { border-radius: 1rem; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,.1); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">ShopNova <i class="bi bi-stars text-warning"></i></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="login.html">Sign In</a></li>
                    <li class="nav-item"><a class="nav-link" href="signup.html">Sign Up</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1">
        <div class="auth-container text-center">
            <div class="card auth-card p-4">
                <div class="card-body">
                    <h3 class="fw-bold mb-4">Sign In</h3>
                    <div id="auth-alert" class="alert alert-danger d-none" role="alert"></div>
                    
                    <form id="login-form">
                        <div class="mb-3 text-start">
                            <label for="email" class="form-label text-muted fw-bold small">GMAIL / EMAIL</label>
                            <input type="email" class="form-control form-control-lg bg-light" id="email" placeholder="name@gmail.com" required>
                        </div>
                        <div class="mb-4 text-start">
                            <label for="password" class="form-label text-muted fw-bold small">PASSWORD</label>
                            <input type="password" class="form-control form-control-lg bg-light" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold shadow-sm" id="login-btn">
                            Sign In
                        </button>
                    </form>
                    
                    <div class="mt-4 pt-3 border-top">
                        <p class="mb-0 text-muted">Don't have an account? <a href="signup.html" class="text-primary text-decoration-none fw-bold">Sign up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
